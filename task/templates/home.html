{% extends "base.html" %}
{% block content %}
<div class="container">
    <center><h1>Welcome to the {{ title }}</h1></center>
</div> 

<table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Completed</th>
                <th>Created At</th>
                <th>Updated At</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.title }}</td>
                <td>{{ task.description }}</td>
                <td>{{ task.completed }}</td>
                <td>{{ task.created_at }}</td>
                <td>{{ task.updated_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
